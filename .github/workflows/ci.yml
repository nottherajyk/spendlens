name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json
          
      - name: Install Dependencies
        run: |
          npm ci
          
      - name: Lint Codebase
        run: |
          npm run lint
          
      - name: Run Tests
        run: |
          npm test
